---
argument_specs:
  main:
    options:
      caddy_caddyfile_template:
        type: "str"
        required: false
        default: "Caddyfile.default.j2"
        description: >-
          Path to the Caddyfile Jinja template to deploy; defaults to the
          role's bundled template
      caddy_site_template:
        type: "str"
        required: false
        description: >-
          Optional path to a site-specific template rendered under
          /srv/caddy/conf.d/
      caddy_image:
        type: "str"
        required: true
        description: "Docker image for Caddy server"
      caddy_local_docker_command:
        type: "str"
        required: false
        description: >-
          Command used on the control host for localhost validation. Defaults
          to docker on macOS and sudo docker on Linux; override if the control
          host uses rootless Docker or a different wrapper.
